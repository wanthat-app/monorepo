AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Wanthat DNS records (stack: wanthat-dns). Adds records to our EXISTING Route 53
  public hosted zone referenced by id — it does NOT create a HostedZone. The CDK
  app (EdgeStack) owns CloudFront alias records; this standalone stack owns the
  domain-verification / mail (Zoho) records that live outside the app lifecycle.

Parameters:
  HostedZoneId:
    Type: String
    Description: >-
      Id of the EXISTING Route 53 public hosted zone (e.g. the wanthat.app zone).
      This stack references it; it never creates a hosted zone.
    Default: Z01833842M5XCPIIPFXKG
    AllowedPattern: "^Z[A-Z0-9]+$"
    ConstraintDescription: Must be a Route 53 hosted zone id (starts with Z).
  DomainName:
    Type: String
    Description: >-
      Apex domain of the hosted zone. Used as the record name for the Zoho "@"
      (zone-root) TXT record.
    Default: wanthat.app

Resources:
  # Zoho domain ownership verification — Zoho lists this as an apex ("@") TXT record.
  # Route 53 requires TXT values to be enclosed in double quotes within the record.
  ZohoVerificationTxt:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: TXT
      TTL: "300"
      ResourceRecords:
        - '"zoho-verification=zb60222279.zmverify.zoho.com"'

Outputs:
  ZohoVerificationRecordName:
    Description: Name of the Zoho verification record created in the zone.
    Value: !Ref ZohoVerificationTxt
