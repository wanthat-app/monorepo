name: Deploy

# Deploys: **dev automatically on merge to `main`**; **prod on publishing a GitHub Release** (a tagged,
# documented promotion of a main commit), behind the `prod` GitHub Environment approval (ADR-0015).
# workflow_dispatch is the break-glass for either env. OIDC-assumed per-env role, no static keys. PRs
# never deploy: they run CI (ci.yml) + Check Deploy (check-deploy.yml, a cdk-diff dry run), so the
# shared dev env changes only on a merge and branches can't clobber each other.
on:
  push:
    branches: [main]
  release:
    types: [published] # publishing a (non-pre) release deploys prod
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prod]
        default: dev

# Serialize deploys per environment so concurrent merges/dispatches don't clobber the shared stacks;
# never cancel an in-flight deploy mid-apply.
concurrency:
  group: deploy-${{ github.event_name == 'release' && 'prod' || github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write # required for OIDC
  contents: write # push the auto-generated version tag on a manual prod deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A pre-release must not auto-deploy prod; full releases, push(main), and dispatch proceed.
    if: github.event_name != 'release' || github.event.release.prerelease == false
    # release -> prod; dispatch -> chosen env; push(main) -> dev. (Env also selects the GitHub
    # Environment, so prod inherits its approval gate.)
    environment: ${{ github.event_name == 'release' && 'prod' || github.event.inputs.environment || 'dev' }}
    env:
      # Selects which wanthat-{env}-* stacks the CDK app instantiates (infra/bin/wanthat.ts).
      WANTHAT_ENV: ${{ github.event_name == 'release' && 'prod' || github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6 # version read from package.json "packageManager"
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v6
        id: aws
        with:
          role-to-assume: ${{ vars.CDK_DEPLOY_ROLE_ARN }} # per-env OIDC role
          aws-region: il-central-1
      # Resolve the version stamped on AWS resources (the `version` tag). A **manual prod** deploy
      # advances the **least-significant segment** of the latest version tag — no assumption about
      # depth: v0.1.3 -> v0.1.4, v0.1 -> v0.2, v1 -> v2 — and the tag is pushed after a successful
      # apply. Every other deploy reuses the latest existing tag (so it matches what's deployed, no
      # spurious diff).
      - name: Resolve version
        id: ver
        run: |
          set -uo pipefail
          git fetch --tags --force >/dev/null 2>&1 || true
          latest=$(git tag -l 'v[0-9]*' | sort -V | tail -1); latest=${latest:-v0.0.0}
          if [ "$WANTHAT_ENV" = "prod" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IFS='.' read -ra parts <<< "${latest#v}"
            i=$(( ${#parts[@]} - 1 )); parts[$i]=$(( ${parts[$i]} + 1 ))
            version="v$(IFS='.'; echo "${parts[*]}")"; bump=true
          else
            version="$latest"; bump=false
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "version=$version (latest tag $latest, bump=$bump)"
      # Pass the resolved account/region/version to CDK. Turbo runs cdk in strict env mode (passthrough
      # for AWS_*/CDK_DEFAULT_*/WANTHAT_VERSION); the app reads CDK_DEFAULT_ACCOUNT + WANTHAT_VERSION.
      # `pnpm run` (not bare `pnpm diff`/`pnpm deploy`) — `deploy` is a pnpm built-in that would
      # otherwise shadow our Turbo script.
      - run: pnpm run diff # cdk diff — recorded in the log right before the apply
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: il-central-1
          WANTHAT_VERSION: ${{ steps.ver.outputs.version }}
      # --concurrency deploys independent stacks in parallel and skips unchanged ones (CDK no-ops them).
      # dev uses --hotswap-fallback (deploy:dev): Lambda code/env/asset changes patch the function
      # directly (seconds), full-CloudFormation fallback otherwise. Hotswap is dev-only — it bypasses
      # CloudFormation and causes drift, so prod always goes through CFN. Caveat: hotswap won't re-fire
      # the migrator Trigger (a custom resource), so a NEW migration needs `pnpm run deploy`.
      - name: Deploy
        run: |
          if [ "$WANTHAT_ENV" = "prod" ]; then pnpm run deploy; else pnpm run deploy:dev; fi
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: il-central-1
          WANTHAT_VERSION: ${{ steps.ver.outputs.version }}
      # Drift guard: fail if a `wanthat-<env>-*` stack is deployed but no longer in code (an orphan).
      # CDK never deletes stacks removed from the app, so we catch them here.
      - name: Reconcile deployed stacks vs code
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: il-central-1
        run: |
          set -uo pipefail
          app=$(cd infra && pnpm exec cdk ls 2>/dev/null | sort -u)
          echo "In code ($WANTHAT_ENV):"; echo "$app"
          if [ -z "$app" ]; then echo "::error::could not list stacks from code"; exit 1; fi
          deployed=""
          for r in il-central-1 us-east-1; do
            s=$(aws cloudformation list-stacks --region "$r" \
                  --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE ROLLBACK_COMPLETE IMPORT_COMPLETE \
                  --query "StackSummaries[?starts_with(StackName, 'wanthat-${WANTHAT_ENV}-')].StackName" --output text)
            deployed="$deployed $s"
          done
          deployed=$(echo "$deployed" | tr ' \t' '\n' | grep . | sort -u || true)
          echo "Deployed:"; echo "$deployed"
          orphans=$(comm -23 <(echo "$deployed") <(echo "$app") || true)
          if [ -n "$orphans" ]; then
            echo "::error::Orphaned stacks are deployed but not in code:"; echo "$orphans"
            echo "Fix: 'cdk destroy <stack>' for each, or re-add it to infra/bin/wanthat.ts."
            exit 1
          fi
          echo "OK — deployed stacks match code; no orphans."
      # On a successful manual prod deploy, promote: create + push the advanced version tag (the
      # version already stamped on the deployed resources). A plain tag (not a published release) so it
      # does not re-trigger the `release` deploy. Create a GitHub Release from it later for notes.
      - name: Tag prod release
        if: steps.ver.outputs.bump == 'true'
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git tag -a "$V" -m "prod deploy $V (${GITHUB_SHA:0:7})"
          git push origin "$V"
          echo "Tagged prod deploy: $V" >> "$GITHUB_STEP_SUMMARY"
