name: Deploy

# OIDC-assumed per-environment role (no static keys); cdk diff gate; prod behind a
# GitHub Environment approval (ADR-0015). main auto-deploys dev; promote via dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      # Selects which wanthat-{env}-* stacks the CDK app instantiates (infra/bin/wanthat.ts).
      WANTHAT_ENV: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v4
        id: aws
        with:
          role-to-assume: ${{ vars.CDK_DEPLOY_ROLE_ARN }} # per-env OIDC role
          aws-region: il-central-1
      # Pass the resolved account/region to CDK explicitly. Turbo runs cdk in strict env mode
      # (globalPassThroughEnv allows AWS_*/CDK_DEFAULT_* through); the app reads CDK_DEFAULT_ACCOUNT.
      # `pnpm run` (not bare `pnpm diff`/`pnpm deploy`) — `deploy` is a pnpm built-in command that
      # would otherwise shadow our Turbo script.
      - run: pnpm run diff # cdk diff — required review gate before any change
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: il-central-1
      - run: pnpm run deploy # cdk deploy (prod gated by Environment approval)
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: il-central-1
