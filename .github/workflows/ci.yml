name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6 # version read from package.json "packageManager"
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint # biome ci .
      - run: pnpm typecheck # turbo, affected-graph
      - run: pnpm test # vitest via turbo (Docker available for Testcontainers)
      - run: pnpm build
      - run: pnpm synth # cdk synth — cheapest infra correctness check (ADR-0001)
