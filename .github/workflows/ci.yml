name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint # biome ci .
      - run: pnpm typecheck # turbo, affected-graph
      - run: pnpm test # vitest via turbo (Docker available for Testcontainers)
      - run: pnpm build
      - run: pnpm synth # cdk synth (dev) — cheapest infra correctness check (ADR-0001)
      # Also synth prod so the us-east-1 EdgeStack (CloudFront/ACM/Route 53) is type/synth-checked.
      - run: WANTHAT_ENV=prod pnpm --filter @wanthat/infra exec cdk synth --quiet
